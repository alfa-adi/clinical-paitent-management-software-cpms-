<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verify Email - CPMS Pro</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: radial-gradient(circle at top right, #1e293b, #0f172a);
        }

        .auth-card {
            background: rgba(30, 41, 59, 0.8);
            padding: 2.5rem;
            border-radius: 16px;
            width: 100%;
            max-width: 400px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3);
            text-align: center;
        }

        .auth-card h2 {
            margin-bottom: 1rem;
        }

        .input-group {
            margin-bottom: 1.5rem;
            text-align: left;
        }

        input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            background: rgba(15, 23, 42, 0.5);
            color: white;
            font-family: inherit;
            text-align: center;
            letter-spacing: 0.5rem;
            font-size: 1.5rem;
        }

        #message {
            margin-top: 1rem;
            font-size: 0.9rem;
        }
    </style>
</head>

<body>

    <div class="auth-card">
        <h2>Verify Your Email</h2>
        <p style="color: var(--text-secondary); margin-bottom: 2rem;">
            We've sent a 6-digit code to your email. Enter it below to activate your account.
        </p>

        <form id="verify-form">
            <div class="input-group">
                <input type="text" id="verification-code" placeholder="000000" maxlength="6" pattern="\d{6}" required>
                <input type="hidden" id="email-hidden">
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%;">Verify Code</button>
            <p id="message"></p>
        </form>

        <p style="margin-top: 1.5rem; font-size: 0.8rem;">
            <a href="login.html" style="color: var(--text-secondary);">Back to Login</a>
        </p>
    </div>

    <script src="js/auth.js"></script>
    <script>
        // Pre-fill email from URL params if available, or ask user to recheck logic
        const urlParams = new URLSearchParams(window.location.search);
        const email = urlParams.get('email');
        if (email) {
            document.getElementById('email-hidden').value = email;
        } else {
            // If no email in URL, maybe prompt or redirect? For now assume it's there.
            document.getElementById('message').textContent = 'Error: No email specified.';
            document.getElementById('message').style.color = 'red';
        }
    </script>
</body>

</html>
